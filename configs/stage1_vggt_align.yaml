model:
  base_model: models/Qwen3-VL-2B-Instruct
  vggt_model: models/VGGT-1B
  num_geo_tokens: 64
  geometry_mode: normal
train:
  epochs: 1
  learning_rate: 1.0e-4
  warmup_ratio: 0.03
  scheduler: cosine
  global_batch_size: 64
  max_seq_len: 4096
  num_frames: 8
  bf16: true
  freeze_vggt: true
  freeze_visual_encoder: true
  freeze_llm: true
  train_geo_adapter: true
data:
  train_jsonl: data/manifests/spatialfit_formal_f8/spar.jsonl
  val_jsonl: data/manifests/spatialfit_formal_f8/spar.jsonl
  vggt_cache_root: cache/vggt/spar
runtime:
  output_dir: outputs/stage1_vggt_align
