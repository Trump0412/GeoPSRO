model:
  vggt_model: models/VGGT-1B
  vggt_source: external/vggt
  device: cuda
data:
  num_frames: 8
  datasets:
    - name: spar
      jsonl: data/manifests/spatialfit_formal_f8/spar.jsonl
      cache_root: cache/vggt/spar
    - name: llava_hound
      jsonl: data/manifests/spatialfit_formal_f8/llava_hound.jsonl
      cache_root: cache/vggt/llava_hound
    - name: spatialladder
      jsonl: data/manifests/stage3/spatialladder_multi_video.jsonl
      cache_root: cache/vggt/spatialladder
    - name: 4dthinker
      jsonl: data/manifests/stage3/4dthinker_4drl.jsonl
      cache_root: cache/vggt/4dthinker
    - name: dsr
      jsonl: data/dsr/test.jsonl
      cache_root: cache/vggt/dsr
